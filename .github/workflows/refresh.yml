name: Refresh bike listings

on:
  schedule:
    - cron: "0 5 * * *"      # 05:00 UTC = 07:00 Sweden (summer). Daily.
  workflow_dispatch: {}       # lets you run it manually from the Actions tab
  push:
    branches: [main]
    paths: [watch.py, build_sites.py, .github/workflows/refresh.yml]

permissions:
  contents: write             # to commit the regenerated pages

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Scrape + build pages
        env:
          APIFY_TOKEN: ${{ secrets.APIFY }}   # optional — enables Facebook source
        run: |
          uv run watch.py --json > std.json
          uv run watch.py xl61 --json > xl61.json
          python3 build_sites.py

      - name: Commit changes
        run: |
          git config user.name "bike-watch-bot"
          git config user.email "actions@github.com"
          git add docs std.json xl61.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Refresh listings ($(date -u +%Y-%m-%d))"
            git push
          fi
